<!DOCTYPE html>
<html>
  <body>
    <h3>Plugin running</h3>
    <p id="status">Waiting</p>

    <script>
      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (msg.type === "status") {
          document.getElementById("status").innerText = msg.text;
        }
      };
    </script>
  </body>
</html>
