<!DOCTYPE html>
<html>

<body>
    <h3>Plugin running...</h3>
    <input id="query" type="text" placeholder="command..."/>
    <button id="btn">Select</button>
    <p id="status">Waiting...</p>

    <script>
        document.getElementById("btn").onclick = () => {
            
            const query = document.getElementById("query").value
            // gets the query written by the user in the UI

            let message
            console.log(query)

            // checks if you can parse 
            try {
                message = JSON.parse(query)
            } catch {
                console.error("Invalid JSON")
                return
            }

            // posts message to code.js
            parent.postMessage({ pluginMessage: message}, "*")
        }


        // checks for messages coming back from code.js
        window.onmessage = (event) => {
            const msg = event.data.pluginMessage;
            if (msg.type === "status") {
                document.getElementById("status").innerText = msg.text;
            }
        };
    </script>
</body>

</html>
